<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 75" width="800" height="75">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
    
    .bg {
      fill: #050a14;
      stroke: rgba(0, 242, 255, 0.15);
      stroke-width: 1;
    }
    
    .text {
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: 20px;
      fill: #00f2ff;
      text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
      dominant-baseline: middle;
    }

    .cursor {
      fill: #00f2ff;
      animation: blink 0.8s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Group visibility */
    .line-group {
      opacity: 0;
      animation: show-group 24s infinite;
    }
    .line-group.line1 { animation-delay: 0s; }
    .line-group.line2 { animation-delay: 4s; }
    .line-group.line3 { animation-delay: 8s; }
    .line-group.line4 { animation-delay: 12s; }
    .line-group.line5 { animation-delay: 16s; }
    .line-group.line6 { animation-delay: 20s; }
    
    @keyframes show-group {
      0%, 15.833% { opacity: 1; }
      16.666%, 100% { opacity: 0; }
    }

    /* Clip paths animations */
    .clip-rect { animation-duration: 24s; animation-iteration-count: infinite; }
    .clip-rect.c1 { animation-name: type-clip-c1; animation-delay: 0s; }
    .clip-rect.c2 { animation-name: type-clip-c2; animation-delay: 4s; }
    .clip-rect.c3 { animation-name: type-clip-c3; animation-delay: 8s; }
    .clip-rect.c4 { animation-name: type-clip-c4; animation-delay: 12s; }
    .clip-rect.c5 { animation-name: type-clip-c5; animation-delay: 16s; }
    .clip-rect.c6 { animation-name: type-clip-c6; animation-delay: 20s; }

    @keyframes type-clip-c1 {
      0% { width: 0; }
      6.25% { width: 260px; }
      12.5% { width: 260px; }
      15.833% { width: 0; }
      16.666%, 100% { width: 0; }
    }
    @keyframes type-clip-c2 {
      0% { width: 0; }
      6.25% { width: 190px; }
      12.5% { width: 190px; }
      15.833% { width: 0; }
      16.666%, 100% { width: 0; }
    }
    @keyframes type-clip-c3 {
      0% { width: 0; }
      6.25% { width: 190px; }
      12.5% { width: 190px; }
      15.833% { width: 0; }
      16.666%, 100% { width: 0; }
    }
    @keyframes type-clip-c4 {
      0% { width: 0; }
      6.25% { width: 250px; }
      12.5% { width: 250px; }
      15.833% { width: 0; }
      16.666%, 100% { width: 0; }
    }
    @keyframes type-clip-c5 {
      0% { width: 0; }
      6.25% { width: 120px; }
      12.5% { width: 120px; }
      15.833% { width: 0; }
      16.666%, 100% { width: 0; }
    }
    @keyframes type-clip-c6 {
      0% { width: 0; }
      6.25% { width: 145px; }
      12.5% { width: 145px; }
      15.833% { width: 0; }
      16.666%, 100% { width: 0; }
    }
    
    /* Cursor animations */
    .cursor-rect { animation-duration: 24s; animation-iteration-count: infinite; }
    .cursor-rect.cur1 { animation-name: type-cursor-c1; animation-delay: 0s; }
    .cursor-rect.cur2 { animation-name: type-cursor-c2; animation-delay: 4s; }
    .cursor-rect.cur3 { animation-name: type-cursor-c3; animation-delay: 8s; }
    .cursor-rect.cur4 { animation-name: type-cursor-c4; animation-delay: 12s; }
    .cursor-rect.cur5 { animation-name: type-cursor-c5; animation-delay: 16s; }
    .cursor-rect.cur6 { animation-name: type-cursor-c6; animation-delay: 20s; }

    @keyframes type-cursor-c1 {
      0% { x: 0; }
      6.25% { x: 255px; }
      12.5% { x: 255px; }
      15.833% { x: 0; }
      16.666%, 100% { x: 0; }
    }
    @keyframes type-cursor-c2 {
      0% { x: 0; }
      6.25% { x: 185px; }
      12.5% { x: 185px; }
      15.833% { x: 0; }
      16.666%, 100% { x: 0; }
    }
    @keyframes type-cursor-c3 {
      0% { x: 0; }
      6.25% { x: 185px; }
      12.5% { x: 185px; }
      15.833% { x: 0; }
      16.666%, 100% { x: 0; }
    }
    @keyframes type-cursor-c4 {
      0% { x: 0; }
      6.25% { x: 245px; }
      12.5% { x: 245px; }
      15.833% { x: 0; }
      16.666%, 100% { x: 0; }
    }
    @keyframes type-cursor-c5 {
      0% { x: 0; }
      6.25% { x: 115px; }
      12.5% { x: 115px; }
      15.833% { x: 0; }
      16.666%, 100% { x: 0; }
    }
    @keyframes type-cursor-c6 {
      0% { x: 0; }
      6.25% { x: 140px; }
      12.5% { x: 140px; }
      15.833% { x: 0; }
      16.666%, 100% { x: 0; }
    }
  </style>
  
  <rect class="bg" width="100%" height="100%" rx="8"/>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0, 242, 255, 0.03)" stroke-width="1"/>
    </pattern>
    <clipPath id="clip1">
      <rect class="clip-rect c1" x="0" y="0" height="75" width="0" />
    </clipPath>
    <clipPath id="clip2">
      <rect class="clip-rect c2" x="0" y="0" height="75" width="0" />
    </clipPath>
    <clipPath id="clip3">
      <rect class="clip-rect c3" x="0" y="0" height="75" width="0" />
    </clipPath>
    <clipPath id="clip4">
      <rect class="clip-rect c4" x="0" y="0" height="75" width="0" />
    </clipPath>
    <clipPath id="clip5">
      <rect class="clip-rect c5" x="0" y="0" height="75" width="0" />
    </clipPath>
    <clipPath id="clip6">
      <rect class="clip-rect c6" x="0" y="0" height="75" width="0" />
    </clipPath>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="8" />

  <!-- Fixed Prefix -->
  <text class="text" x="30" y="37.5">HI, I AM KRISHIV AND I BUILD </text>

  <!-- Group 1: STUFF ON THE INTERNET -->
  <g class="line-group line1" transform="translate(378, 37.5)">
    <text class="text" x="0" y="0" clip-path="url(#clip1)">STUFF ON THE INTERNET</text>
    <rect class="cursor cursor-rect cur1" y="-12" width="10" height="24" />
  </g>

  <!-- Group 2: AI APPLICATIONS -->
  <g class="line-group line2" transform="translate(378, 37.5)">
    <text class="text" x="0" y="0" clip-path="url(#clip2)">AI APPLICATIONS</text>
    <rect class="cursor cursor-rect cur2" y="-12" width="10" height="24" />
  </g>

  <!-- Group 3: GAMES ON ROBLOX -->
  <g class="line-group line3" transform="translate(378, 37.5)">
    <text class="text" x="0" y="0" clip-path="url(#clip3)">GAMES ON ROBLOX</text>
    <rect class="cursor cursor-rect cur3" y="-12" width="10" height="24" />
  </g>

  <!-- Group 4: COOL WEB EXPERIENCES -->
  <g class="line-group line4" transform="translate(378, 37.5)">
    <text class="text" x="0" y="0" clip-path="url(#clip4)">COOL WEB EXPERIENCES</text>
    <rect class="cursor cursor-rect cur4" y="-12" width="10" height="24" />
  </g>

  <!-- Group 5: VIBE CODE -->
  <g class="line-group line5" transform="translate(378, 37.5)">
    <text class="text" x="0" y="0" clip-path="url(#clip5)">VIBE CODE</text>
    <rect class="cursor cursor-rect cur5" y="-12" width="10" height="24" />
  </g>

  <!-- Group 6: VIBE CODING -->
  <g class="line-group line6" transform="translate(378, 37.5)">
    <text class="text" x="0" y="0" clip-path="url(#clip6)">VIBE CODING</text>
    <rect class="cursor cursor-rect cur6" y="-12" width="10" height="24" />
  </g>
</svg>
