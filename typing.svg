<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 75" width="800" height="75">
  <style>
    .bg {
      fill: #050a14;
      stroke: rgba(0, 242, 255, 0.15);
      stroke-width: 1;
    }
    
    .text {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-weight: 700;
      font-size: 20px;
      fill: #00f2ff;
      text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
    }

    .cursor {
      fill: #00f2ff;
      animation: blink 0.8s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Group visibility animations in CSS (works fine outside defs) */
    .line-group {
      opacity: 0;
      animation: show-group 24s infinite;
    }
    .line-group.line1 { animation-delay: 0s; }
    .line-group.line2 { animation-delay: 4s; }
    .line-group.line3 { animation-delay: 8s; }
    .line-group.line4 { animation-delay: 12s; }
    .line-group.line5 { animation-delay: 16s; }
    .line-group.line6 { animation-delay: 20s; }
    
    @keyframes show-group {
      0%, 15.833% { opacity: 1; }
      16.666%, 100% { opacity: 0; }
    }
  </style>
  
  <rect class="bg" width="100%" height="100%" rx="8"/>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0, 242, 255, 0.03)" stroke-width="1"/>
    </pattern>
    
    <!-- SMIL animated clip-rects for 100% browser compatibility -->
    <clipPath id="clip1">
      <rect x="0" y="0" height="75" width="0">
        <animate 
          attributeName="width" 
          values="0; 260; 260; 0; 0; 0" 
          keyTimes="0; 0.0625; 0.125; 0.1583; 0.1667; 1"
          dur="24s" 
          repeatCount="indefinite" 
        />
      </clipPath>
    </clipPath>
    <clipPath id="clip2">
      <rect x="0" y="0" height="75" width="0">
        <animate 
          attributeName="width" 
          values="0; 0; 190; 190; 0; 0; 0" 
          keyTimes="0; 0.1667; 0.2292; 0.2917; 0.3250; 0.3333; 1"
          dur="24s" 
          repeatCount="indefinite" 
        />
      </clipPath>
    </clipPath>
    <clipPath id="clip3">
      <rect x="0" y="0" height="75" width="0">
        <animate 
          attributeName="width" 
          values="0; 0; 190; 190; 0; 0; 0" 
          keyTimes="0; 0.3333; 0.3958; 0.4583; 0.4917; 0.5000; 1"
          dur="24s" 
          repeatCount="indefinite" 
        />
      </clipPath>
    </clipPath>
    <clipPath id="clip4">
      <rect x="0" y="0" height="75" width="0">
        <animate 
          attributeName="width" 
          values="0; 0; 250; 250; 0; 0; 0" 
          keyTimes="0; 0.5000; 0.5625; 0.6250; 0.6583; 0.6667; 1"
          dur="24s" 
          repeatCount="indefinite" 
        />
      </clipPath>
    </clipPath>
    <clipPath id="clip5">
      <rect x="0" y="0" height="75" width="0">
        <animate 
          attributeName="width" 
          values="0; 0; 120; 120; 0; 0; 0" 
          keyTimes="0; 0.6667; 0.7292; 0.7917; 0.8250; 0.8333; 1"
          dur="24s" 
          repeatCount="indefinite" 
        />
      </clipPath>
    </clipPath>
    <clipPath id="clip6">
      <rect x="0" y="0" height="75" width="0">
        <animate 
          attributeName="width" 
          values="0; 0; 145; 145; 0; 0" 
          keyTimes="0; 0.8333; 0.8958; 0.9583; 0.9917; 1"
          dur="24s" 
          repeatCount="indefinite" 
        />
      </clipPath>
    </clipPath>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="8" />

  <!-- Fixed Prefix -->
  <text class="text" x="30" y="44" xml:space="preserve">HI, I AM KRISHIV AND I BUILD </text>

  <!-- Group 1: STUFF ON THE INTERNET -->
  <g class="line-group line1" transform="translate(378, 0)">
    <text class="text" x="0" y="44" xml:space="preserve" clip-path="url(#clip1)">STUFF ON THE INTERNET</text>
    <rect class="cursor" y="26" width="10" height="24" x="0">
      <animate 
        attributeName="x" 
        values="0; 255; 255; 0; 0; 0" 
        keyTimes="0; 0.0625; 0.125; 0.1583; 0.1667; 1"
        dur="24s" 
        repeatCount="indefinite" 
      />
    </rect>
  </g>

  <!-- Group 2: AI APPLICATIONS -->
  <g class="line-group line2" transform="translate(378, 0)">
    <text class="text" x="0" y="44" xml:space="preserve" clip-path="url(#clip2)">AI APPLICATIONS</text>
    <rect class="cursor" y="26" width="10" height="24" x="0">
      <animate 
        attributeName="x" 
        values="0; 0; 185; 185; 0; 0; 0" 
        keyTimes="0; 0.1667; 0.2292; 0.2917; 0.3250; 0.3333; 1"
        dur="24s" 
        repeatCount="indefinite" 
      />
    </rect>
  </g>

  <!-- Group 3: GAMES ON ROBLOX -->
  <g class="line-group line3" transform="translate(378, 0)">
    <text class="text" x="0" y="44" xml:space="preserve" clip-path="url(#clip3)">GAMES ON ROBLOX</text>
    <rect class="cursor" y="26" width="10" height="24" x="0">
      <animate 
        attributeName="x" 
        values="0; 0; 185; 185; 0; 0; 0" 
        keyTimes="0; 0.3333; 0.3958; 0.4583; 0.4917; 0.5000; 1"
        dur="24s" 
        repeatCount="indefinite" 
      />
    </rect>
  </g>

  <!-- Group 4: COOL WEB EXPERIENCES -->
  <g class="line-group line4" transform="translate(378, 0)">
    <text class="text" x="0" y="44" xml:space="preserve" clip-path="url(#clip4)">COOL WEB EXPERIENCES</text>
    <rect class="cursor" y="26" width="10" height="24" x="0">
      <animate 
        attributeName="x" 
        values="0; 0; 245; 245; 0; 0; 0" 
        keyTimes="0; 0.5000; 0.5625; 0.6250; 0.6583; 0.6667; 1"
        dur="24s" 
        repeatCount="indefinite" 
      />
    </rect>
  </g>

  <!-- Group 5: VIBE CODE -->
  <g class="line-group line5" transform="translate(378, 0)">
    <text class="text" x="0" y="44" xml:space="preserve" clip-path="url(#clip5)">VIBE CODE</text>
    <rect class="cursor" y="26" width="10" height="24" x="0">
      <animate 
        attributeName="x" 
        values="0; 0; 115; 115; 0; 0; 0" 
        keyTimes="0; 0.6667; 0.7292; 0.7917; 0.8250; 0.8333; 1"
        dur="24s" 
        repeatCount="indefinite" 
      />
    </rect>
  </g>

  <!-- Group 6: VIBE CODING -->
  <g class="line-group line6" transform="translate(378, 0)">
    <text class="text" x="0" y="44" xml:space="preserve" clip-path="url(#clip6)">VIBE CODING</text>
    <rect class="cursor" y="26" width="10" height="24" x="0">
      <animate 
        attributeName="x" 
        values="0; 0; 140; 140; 0; 0" 
        keyTimes="0; 0.8333; 0.8958; 0.9583; 0.9917; 1"
        dur="24s" 
        repeatCount="indefinite" 
      />
    </rect>
  </g>
</svg>
