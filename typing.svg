<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 75" width="800" height="75">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
    
    .bg {
      fill: #050a14;
      stroke: rgba(0, 242, 255, 0.15);
      stroke-width: 1;
    }
    
    .text {
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: 20px;
      fill: #00f2ff;
      text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
      dominant-baseline: middle;
    }
    
    .cursor {
      fill: #00f2ff;
      animation: blink 0.8s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
  
  <rect class="bg" width="100%" height="100%" rx="8"/>
  
  <!-- Subtle CRT lines / Grid background -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0, 242, 255, 0.03)" stroke-width="1"/>
    </pattern>
    <clipPath id="clip">
      <rect x="0" y="0" height="75" width="0">
        <animate 
          attributeName="width" 
          values="0; 580; 580; 0; 0" 
          keyTimes="0; 0.5; 0.8; 0.95; 1"
          dur="6s" 
          repeatCount="indefinite" 
        />
      </rect>
    </clipPath>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="8" />
  
  <!-- Typing text -->
  <g transform="translate(30, 37.5)">
    <text class="text" x="0" y="0" clip-path="url(#clip)">HI, I AM KRISHIV AND I BUILD AI APPLICATIONS</text>
    
    <!-- Moving cursor -->
    <rect class="cursor" y="-12" width="10" height="24">
      <animate 
        attributeName="x" 
        values="0; 535; 535; 0; 0" 
        keyTimes="0; 0.5; 0.8; 0.95; 1"
        dur="6s" 
        repeatCount="indefinite" 
      />
    </rect>
  </g>
</svg>
