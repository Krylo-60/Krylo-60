<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 210" width="360" height="210">
  <style>
    .bg {
      fill: #050a14;
      stroke: rgba(0, 242, 255, 0.25);
      stroke-width: 1.5;
    }
    
    .grid {
      fill: url(#grid-pattern);
    }
    
    .header {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      font-weight: 700;
      fill: #00f2ff;
      text-shadow: 0 0 6px rgba(0, 242, 255, 0.5);
      letter-spacing: 1px;
    }
    
    .badge-bg {
      fill: #091326;
      stroke: rgba(0, 242, 255, 0.2);
      stroke-width: 1;
      transition: all 0.3s;
      animation: border-pulse 4s infinite alternate;
    }
    
    @keyframes border-pulse {
      0% { stroke: rgba(0, 242, 255, 0.25); }
      100% { stroke: rgba(0, 242, 255, 0.6); filter: drop-shadow(0 0 3px rgba(0, 242, 255, 0.4)); }
    }
    
    .badge-text {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      font-weight: 700;
      fill: #ffffff;
    }
    
    .dot {
      r: 3.5;
    }
    
    .dot-html { fill: #e34f26; }
    .dot-css { fill: #1572b6; }
    .dot-js { fill: #f7df1e; }
    .dot-node { fill: #339933; }
    .dot-vercel { fill: #ffffff; }
    .dot-firebase { fill: #ffca28; }
    .dot-playwright { fill: #2ead33; }
    .dot-rojo { fill: #e00000; }
    .dot-git { fill: #f05032; }
    
    .scanline {
      stroke: rgba(0, 242, 255, 0.1);
      stroke-width: 1;
      animation: scan 6s linear infinite;
    }
    
    @keyframes scan {
      0% { y1: 5; y2: 5; }
      100% { y1: 205; y2: 205; }
    }
  </style>
  
  <defs>
    <pattern id="grid-pattern" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="rgba(0, 242, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Box Shell -->
  <rect class="bg" width="100%" height="100%" rx="8"/>
  <rect class="grid" width="100%" height="100%" rx="8"/>
  
  <!-- Header -->
  <text class="header" x="20" y="32">🛠️ WEAPONS OF CHOICE</text>
  <line x1="20" y1="42" x2="340" y2="42" stroke="rgba(0, 242, 255, 0.25)" stroke-width="1"/>
  
  <!-- ROW 1 -->
  <!-- HTML5 -->
  <g transform="translate(20, 55)">
    <rect class="badge-bg" width="100" height="35" rx="6"/>
    <circle class="dot dot-html" cx="20" cy="17.5"/>
    <text class="badge-text" x="35" y="21.5">HTML5</text>
  </g>
  <!-- CSS3 -->
  <g transform="translate(130, 55)">
    <rect class="badge-bg" width="100" height="35" rx="6"/>
    <circle class="dot dot-css" cx="20" cy="17.5"/>
    <text class="badge-text" x="35" y="21.5">CSS3</text>
  </g>
  <!-- JavaScript -->
  <g transform="translate(240, 55)">
    <rect class="badge-bg" width="100" height="35" rx="6"/>
    <circle class="dot dot-js" cx="20" cy="17.5"/>
    <text class="badge-text" x="35" y="21.5">JS (ES6)</text>
  </g>
  
  <!-- ROW 2 -->
  <!-- Node.js -->
  <g transform="translate(20, 105)">
    <rect class="badge-bg" width="100" height="35" rx="6"/>
    <circle class="dot dot-node" cx="20" cy="17.5"/>
    <text class="badge-text" x="35" y="21.5">NODE.JS</text>
  </g>
  <!-- Vercel -->
  <g transform="translate(130, 105)">
    <rect class="badge-bg" width="100" height="35" rx="6"/>
    <circle class="dot dot-vercel" cx="20" cy="17.5"/>
    <text class="badge-text" x="35" y="21.5">VERCEL</text>
  </g>
  <!-- Firebase -->
  <g transform="translate(240, 105)">
    <rect class="badge-bg" width="100" height="35" rx="6"/>
    <circle class="dot dot-firebase" cx="20" cy="17.5"/>
    <text class="badge-text" x="35" y="21.5">FIREBASE</text>
  </g>
  
  <!-- ROW 3 -->
  <!-- Playwright -->
  <g transform="translate(20, 155)">
    <rect class="badge-bg" width="100" height="35" rx="6"/>
    <circle class="dot dot-playwright" cx="20" cy="17.5"/>
    <text class="badge-text" x="35" y="21.5">PLAYWRIGHT</text>
  </g>
  <!-- Rojo -->
  <g transform="translate(130, 155)">
    <rect class="badge-bg" width="100" height="35" rx="6"/>
    <circle class="dot dot-rojo" cx="20" cy="17.5"/>
    <text class="badge-text" x="35" y="21.5">ROJO</text>
  </g>
  <!-- Git -->
  <g transform="translate(240, 155)">
    <rect class="badge-bg" width="100" height="35" rx="6"/>
    <circle class="dot dot-git" cx="20" cy="17.5"/>
    <text class="badge-text" x="35" y="21.5">GIT</text>
  </g>
  
  <!-- Scanline Animation -->
  <line class="scanline" x1="5" y1="5" x2="355" y2="5"/>
</svg>
