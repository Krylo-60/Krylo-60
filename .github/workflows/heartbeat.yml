name: Hourly System Heartbeat

on:
  schedule:
    - cron: '0 * * * *' # Runs at the start of every hour
  workflow_dispatch: # Allows manual trigger

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Heartbeat Script
        run: node heartbeat.js

      - name: Commit and Push Heartbeat
        run: |
          git config --global user.name "Krylo-60"
          git config --global user.email "71krishivpb@gmail.com"
          git add README.md index.html
          if ! git diff-index --quiet HEAD --; then
            git commit -m "telemetry: system heartbeat update $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git pull origin main --rebase
            git push
          else
            echo "No telemetry changes detected"
          fi
